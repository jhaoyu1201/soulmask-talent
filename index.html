
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1612;--ink2:#4a4540;--ink3:#8a8480;
  --sand:#f5f0e8;--sand2:#ede7d9;--sand3:#ddd6c6;
  --gold:#7a5c0e;--gold2:#c49a2a;--gold-lt:#f5eac8;
  --teal:#0d5c4a;--teal-lt:#d4ede7;
  --wolf:#7a4a10;--wolf-lt:#f5e6d0;
  --horn:#0d5c4a;--horn-lt:#d4ede7;
  --warrior:#1a3a6b;--warrior-lt:#d8e4f5;
  --guard:#6b1a3a;--guard-lt:#f5d8e4;
  --hunter:#2a5a10;--hunter-lt:#dff0d4;
  --general:#3d3a35;--general-lt:#eae6de;
  --job:#3a1a6b;--job-lt:#e8d8f5;
  --red:#8b1a1a;
}
.app{background:var(--sand);font-family:'Noto Sans TC',sans-serif;color:var(--ink);min-height:500px}
.hero{background:var(--ink);padding:1.75rem 1.75rem 1.4rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(255,255,255,.012) 40px,rgba(255,255,255,.012) 41px)}
.hero-eye{font-size:10px;letter-spacing:.2em;color:var(--gold2);margin-bottom:.4rem}
.hero-title{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;color:#f0ead8;line-height:1.2;margin-bottom:.3rem}
.hero-sub{font-size:12px;color:#7a7468;letter-spacing:.04em}
.deco{position:absolute;right:1.5rem;top:50%;transform:translateY(-50%);width:72px;height:72px;border:1px solid rgba(196,154,42,.18);border-radius:50%;display:flex;align-items:center;justify-content:center}
.deco-inner{width:26px;height:26px;border:1.5px solid rgba(196,154,42,.45);transform:rotate(45deg)}
.tabs{display:flex;border-bottom:0.5px solid var(--sand3);background:#fff}
.tab{flex:1;padding:.7rem 1rem;font-size:13px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:2px solid transparent;text-align:center;transition:all .15s;font-family:'Noto Sans TC',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:var(--ink2)}.tab.on{color:var(--gold);border-bottom-color:var(--gold2)}
.panel{display:none;padding:1.1rem 1.25rem}.panel.on{display:block}
.search-wrap{position:relative;margin-bottom:.85rem}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--ink3);pointer-events:none}
.search-wrap input{width:100%;padding:10px 12px 10px 38px;border:0.5px solid var(--sand3);border-radius:10px;background:#fff;font-size:13.5px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--gold2)}
.search-wrap input::placeholder{color:var(--ink3)}
.filters{background:#fff;border:0.5px solid var(--sand3);border-radius:12px;padding:.9rem 1.1rem;margin-bottom:.9rem;display:flex;flex-direction:column;gap:7px}
.frow{display:flex;align-items:flex-start;gap:9px}
.flbl{font-size:10px;letter-spacing:.1em;color:var(--ink3);padding-top:5px;min-width:28px;flex-shrink:0}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 11px;font-size:11.5px;border-radius:99px;border:0.5px solid var(--sand3);background:transparent;color:var(--ink2);cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .12s;line-height:1.6}
.chip:hover{border-color:var(--gold2);color:var(--gold)}
.chip.on{font-weight:500;color:#fff;border-color:transparent}
.ca.on{background:var(--ink)}.cdc.on{background:var(--teal)}.cb.on{background:var(--warrior)}
.cw.on{background:var(--wolf)}.ch.on{background:var(--horn)}.cwr.on{background:var(--warrior)}
.cg.on{background:var(--guard)}.chu.on{background:var(--hunter)}.cge.on{background:var(--general)}.cj.on{background:var(--job)}
.catk.on{background:#8b2a2a}.cdef.on{background:#1a4a6b}.coth.on{background:#3a6b1a}
.meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.meta-count{font-size:12px;color:var(--ink3)}.meta-count b{color:var(--ink);font-weight:500}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.55rem}
.tcard{background:#fff;border:0.5px solid var(--sand3);border-radius:12px;padding:.9rem 1rem;border-left:3px solid transparent;transition:all .15s;position:relative}
.tcard:hover{border-left-color:var(--gold2)}
.tcard.selectable{cursor:pointer}.tcard.selectable:hover{border-color:var(--gold2)}
.tcard.picked{border-color:var(--gold2);border-left-color:var(--gold2);background:var(--gold-lt)}
.tcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:.5rem}
.tcard-name{font-family:'Noto Serif TC',serif;font-size:14px;font-weight:500;color:var(--ink);line-height:1.3}
.badges{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;white-space:nowrap;line-height:1.5}
.bd-dlc{background:var(--teal-lt);color:var(--teal)}.bd-base{background:var(--warrior-lt);color:var(--warrior)}
.bd-wolf{background:var(--wolf-lt);color:var(--wolf)}.bd-horn{background:var(--horn-lt);color:var(--horn)}
.bd-warrior{background:var(--warrior-lt);color:var(--warrior)}.bd-guard{background:var(--guard-lt);color:var(--guard)}
.bd-hunter{background:var(--hunter-lt);color:var(--hunter)}.bd-general{background:var(--general-lt);color:var(--general)}
.bd-job{background:var(--job-lt);color:var(--job)}
.bd-atk{background:#f5d8d8;color:#8b1a1a}.bd-def{background:#d8e4f5;color:#1a3a6b}.bd-oth{background:#dff0d4;color:#2a5a10}
.tcard-desc{font-size:12px;line-height:1.75;color:var(--ink2)}
.tcard-cd{margin-top:.4rem;font-size:11px;color:var(--ink3)}
.cd-pill{display:inline-block;padding:1px 8px;border-radius:99px;background:var(--gold-lt);color:var(--gold);font-size:11px;font-weight:500}
.add-btn{position:absolute;top:.85rem;right:.9rem;width:26px;height:26px;border-radius:50%;background:var(--gold2);border:none;color:#fff;font-size:16px;line-height:1;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .15s;font-weight:300}
.add-btn:hover{background:var(--gold)}
.tcard.selectable:hover .add-btn{display:flex}
.tcard.picked .add-btn{display:flex;background:var(--red);font-size:14px}
.selecting-banner{background:var(--gold-lt);border:0.5px solid var(--gold2);border-radius:10px;padding:.65rem 1rem;margin-bottom:.85rem;font-size:12.5px;color:var(--gold);display:flex;align-items:center;justify-content:space-between;gap:8px}
.cancel-btn{padding:4px 10px;border-radius:6px;border:0.5px solid var(--gold2);background:transparent;color:var(--gold);font-size:11.5px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.cancel-btn:hover{background:var(--gold2);color:#fff}
.planner-top{display:flex;gap:.6rem;align-items:center;margin-bottom:1rem;flex-wrap:wrap}
.planner-top input{flex:1;min-width:140px;padding:8px 12px;border:0.5px solid var(--sand3);border-radius:8px;background:#fff;font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);outline:none}
.planner-top input:focus{border-color:var(--gold2)}
.btn-primary{padding:8px 16px;border-radius:8px;border:none;background:var(--ink);color:#f0ead8;font-size:13px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-primary:hover{background:var(--gold)}
.tribe-list{display:flex;flex-direction:column;gap:.85rem}
.tribe-card{background:#fff;border:0.5px solid var(--sand3);border-radius:14px;overflow:hidden}
.tribe-head{display:flex;align-items:center;gap:10px;padding:.85rem 1.1rem;border-bottom:0.5px solid var(--sand2)}
.tribe-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Noto Serif TC',serif;font-size:15px;color:#f0ead8;font-weight:700;flex-shrink:0}
.tribe-name-wrap{flex:1}
.tribe-name{font-family:'Noto Serif TC',serif;font-size:15px;font-weight:500;color:var(--ink)}
.tribe-count{font-size:11px;color:var(--ink3);margin-top:1px}
.tribe-actions{display:flex;gap:6px}
.icon-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--sand3);background:transparent;color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-btn:hover{border-color:var(--red);color:var(--red)}.icon-btn.edit:hover{border-color:var(--gold2);color:var(--gold)}
.tribe-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;padding:.85rem 1.1rem}
.slot-empty-card{border:0.5px dashed var(--sand3);border-radius:10px;padding:.75rem;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;transition:all .15s}
.slot-empty-card:hover{border-color:var(--gold2);background:var(--gold-lt)}
.slot-empty-card:hover .slot-plus{color:var(--gold)}
.slot-plus{font-size:18px;color:var(--sand3);line-height:1;transition:color .15s}
.slot-empty-label{font-size:10px;color:var(--ink3)}
.slot-filled-card{border:0.5px solid var(--sand3);border-radius:10px;padding:.75rem;background:var(--sand);position:relative}
.slot-filled-head{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:.45rem}
.slot-filled-name{font-family:'Noto Serif TC',serif;font-size:13px;font-weight:500;color:var(--ink);line-height:1.3;flex:1}
.slot-remove{width:18px;height:18px;border-radius:4px;border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:12px;line-height:1;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .12s;padding:0}
.slot-remove:hover{color:var(--red)}
.slot-filled-badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:.45rem}
.slot-filled-desc{font-size:11px;line-height:1.65;color:var(--ink2)}
.slot-filled-cd{margin-top:.35rem;font-size:10px;color:var(--ink3)}
.slot-cd-pill{display:inline-block;padding:1px 6px;border-radius:99px;background:var(--gold-lt);color:var(--gold);font-size:10px;font-weight:500}
.empty-planner{padding:3rem 1rem;text-align:center;color:var(--ink3)}
.empty-planner p{font-size:13px;margin-top:.5rem}
mark{background:var(--gold-lt);color:var(--gold);border-radius:2px;padding:0 1px}
</style>

<div class="app">
<h2 style="position:absolute;width:1px;height:1px;overflow:hidden">靈魂面甲天賦規劃器</h2>
<div class="hero">
  <div class="hero-eye">SOULMASK · TALENT DATABASE</div>
  <div class="hero-title">天賦查詢 · 族人規劃</div>
  <div class="hero-sub">本體 + 浮沙DLC · 全天賦整合版</div>
  <div class="deco"><div class="deco-inner"></div></div>
</div>
<div class="tabs">
  <button class="tab on" onclick="switchTab('db')">天賦資料庫</button>
  <button class="tab" onclick="switchTab('plan')">族人規劃</button>
</div>
<div class="panel on" id="panel-db">
  <div class="search-wrap">
    <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5.5" cy="5.5" r="4"/><line x1="8.8" y1="8.8" x2="13" y2="13"/></svg>
    <input type="text" id="q" placeholder="搜尋天賦名稱、效果…" oninput="renderDB()">
  </div>
  <div class="filters">
    <div class="frow">
      <span class="flbl">來源</span>
      <div class="chips" id="sg">
        <button class="chip ca on" data-v="all" onclick="sf(this,'src')">全部</button>
        <button class="chip cdc" data-v="DLC" onclick="sf(this,'src')">浮沙DLC</button>
        <button class="chip cb" data-v="本體" onclick="sf(this,'src')">本體</button>
      </div>
    </div>
    <div class="frow">
      <span class="flbl">分類</span>
      <div class="chips" id="cat-g">
        <button class="chip ca on" data-v="all" onclick="sf(this,'cat')">全部</button>
        <button class="chip catk" data-v="攻擊" onclick="sf(this,'cat')">攻擊型</button>
        <button class="chip cdef" data-v="防禦" onclick="sf(this,'cat')">防禦型</button>
        <button class="chip coth" data-v="其他" onclick="sf(this,'cat')">其他</button>
      </div>
    </div>
    <div class="frow">
      <span class="flbl">專屬</span>
      <div class="chips" id="tg">
        <button class="chip ca on" data-v="all" onclick="sf(this,'tag')">全部</button>
        <button class="chip cw" data-v="荒狼" onclick="sf(this,'tag')">荒狼</button>
        <button class="chip ch" data-v="蠻角" onclick="sf(this,'tag')">蠻角</button>
        <button class="chip cwr" data-v="戰士" onclick="sf(this,'tag')">戰士</button>
        <button class="chip cg" data-v="衛士" onclick="sf(this,'tag')">衛士</button>
        <button class="chip chu" data-v="獵手" onclick="sf(this,'tag')">獵手</button>
        <button class="chip cge" data-v="通用" onclick="sf(this,'tag')">通用</button>
        <button class="chip cj" data-v="職業" onclick="sf(this,'tag')">職業專屬</button>
      </div>
    </div>
  </div>
  <div class="meta"><div class="meta-count">找到 <b id="rc">0</b> 條天賦</div></div>
  <div class="grid" id="grid"></div>
</div>
<div class="panel" id="panel-plan">
  <div id="selecting-banner" style="display:none" class="selecting-banner">
    <span id="banner-text"></span>
    <button class="cancel-btn" onclick="cancelSelect()">取消</button>
  </div>
  <div class="planner-top">
    <input type="text" id="new-name" placeholder="輸入族人名稱…" onkeydown="if(event.key==='Enter')addTribe()">
    <button class="btn-primary" onclick="addTribe()">新增族人</button>
  </div>
  <div class="tribe-list" id="tribe-list"></div>
  <div class="empty-planner" id="empty-plan">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.2" style="margin:0 auto;display:block;color:var(--sand3)"><circle cx="20" cy="20" r="16"/><line x1="20" y1="12" x2="20" y2="22"/><circle cx="20" cy="27" r="1.5" fill="currentColor" stroke="none"/></svg>
    <p>還沒有族人，先新增一位吧！</p>
  </div>
</div>
</div>

<script>
const SRC={DLC:"浮沙DLC",本體:"本體"};
const BD_SRC={DLC:"bd-dlc",本體:"bd-base"};
const BD_TAG={荒狼:"bd-wolf",蠻角:"bd-horn",戰士:"bd-warrior",衛士:"bd-guard",獵手:"bd-hunter",通用:"bd-general",職業:"bd-job"};
const BD_CAT={攻擊:"bd-atk",防禦:"bd-def",其他:"bd-oth"};
const CAT_LBL={攻擊:"攻擊型",防禦:"防禦型",其他:"其他"};
const ACOLORS=["#2C2C2A","#0d5c4a","#1a3a6b","#6b1a3a","#7a4a10","#2a5a10","#3a1a6b","#7a3a1a"];

const DATA=[
  // ── DLC ──
  {src:"DLC",cat:"防禦",tag:"通用",name:"微風勁雨",desc:"自身移動速度永久降低 30%，但攻擊速度提升 30%。",cd:"永久"},
  {src:"DLC",cat:"防禦",tag:"荒狼",name:"群狼庇護",desc:"生命值回滿或從瀕死恢復時，使自己及 10 米範圍內的友方族人不受絕大多數減速效果影響，持續 12 秒。",cd:"30s"},
  {src:"DLC",cat:"防禦",tag:"蠻角",name:"蠻角庇護",desc:"生命值回滿或從瀕死恢復時，使自己及 10 米範圍內的友方族人不被造成暴擊，持續 12 秒。",cd:"30s"},
  {src:"DLC",cat:"攻擊",tag:"通用",name:"回光反擊",desc:"生命值回滿或從瀕死恢復後 6 秒內，受到來自 5 米以內的攻擊，返還 100% 傷害給攻擊者。",cd:"30s"},
  {src:"DLC",cat:"防禦",tag:"通用",name:"攫體化血",desc:"生命值低於 50% 時觸發，在 12 秒內受到的傷害轉換為同比例的體力傷害。此期間體力不會自然恢復，直至體力耗盡。",cd:"30s"},
  {src:"DLC",cat:"防禦",tag:"通用",name:"攫體化韌",desc:"生命值低於 50% 時觸發，在 12 秒內受到的韌性傷害轉換為體力傷害。此期間體力不會自然恢復，直至體力耗盡。",cd:"30s"},
  {src:"DLC",cat:"防禦",tag:"通用",name:"強韌愈合",desc:"生命值高於 70% 時受到傷害，每秒恢復基於防御力 30% 的生命至滿。",cd:"—"},

  {src:"DLC",cat:"防禦",tag:"通用",name:"余燄",desc:"生命耗盡時不會進入瀕死，在 12 秒內可額外承受 9 次致死攻擊，次數耗盡則立即死亡。",cd:"45s"},
  {src:"DLC",cat:"其他",tag:"通用",name:"體力虹吸",desc:"攻擊命中目標時有 15% 概率觸發，使其在 12 秒內每次攻擊額外消耗 20 點體力，並為施加者恢復 20 點體力。",cd:"—"},

  {src:"DLC",cat:"攻擊",tag:"通用",name:"染血荊棘",desc:"自身處於流血狀態時，也會將流血效果傳遞給 3 米範圍內的敵人。",cd:"—"},
  {src:"DLC",cat:"防禦",tag:"通用",name:"生命枷鎖",desc:"受到攻擊時有 15% 概率觸發，在 25 秒內徹底失去生命恢復能力，但每次受到傷害至多失去 2% 最大生命。",cd:"60s"},
  {src:"DLC",cat:"其他",tag:"蠻角",name:"嫁禍",desc:"受到攻擊時有 15% 概率觸發，在 12 秒內能將敵人施加的持續效果轉移到 15 米範圍內其他敵人身上。",cd:"30s"},
  {src:"DLC",cat:"其他",tag:"荒狼",name:"狡詐",desc:"受到攻擊時有 15% 概率觸發，在 12 秒內能將敵人施加的持續效果返還給施加者。",cd:"30s"},
  {src:"DLC",cat:"防禦",tag:"通用",name:"禁忌之軀",desc:"受到攻擊時有 15% 概率觸發，使攻擊者在 15 秒內所有天賦無法觸發。",cd:"40s"},
  {src:"DLC",cat:"攻擊",tag:"通用",name:"暴走",desc:"身體同時存在點燃、中毒、流血時，進入 15 秒「暴走」狀態：增加 20% 攻速、移速，傷害的 20% 轉化為生命恢復，免疫絕大部分減速效果。",cd:"30s"},
  {src:"DLC",cat:"其他",tag:"通用",name:"勇氣激流",desc:"攻擊命中目標時有 15% 概率觸發，清除自身天賦的冷卻狀態。",cd:"30s"},

function getTribe(id){return tribes.find(t=>t.id===id)}

function switchTab(t){
  document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("on",["db","plan"][i]===t));
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
  document.getElementById("panel-"+t).classList.add("on");
  renderDB();
}
function sf(btn,g){
  const map={src:"sg",cat:"cat-g",tag:"tg"};
  document.querySelectorAll("#"+map[g]+" .chip").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  if(g==="src")curSrc=btn.dataset.v;
  else if(g==="cat")curCat=btn.dataset.v;
  else curTag=btn.dataset.v;
  renderDB();
}
function hl(t,q){
  if(!q)return t;
  return t.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>");
}
function addTribe(){
  const inp=document.getElementById("new-name");
  const name=inp.value.trim();
  if(!name)return;
  tribes.push({id:uid(),name,talents:[null,null,null,null,null,null]});
  inp.value="";renderPlan();
}
function deleteTribe(id){
  tribes=tribes.filter(t=>t.id!==id);
  if(selectingFor&&selectingFor.tribeId===id)cancelSelect();
  renderPlan();
}
function renameTribe(id){
  const t=getTribe(id);if(!t)return;
  const n=prompt("重新命名族人：",t.name);
  if(n&&n.trim()){t.name=n.trim();renderPlan();}
}
function startSelect(tribeId,slotIdx){
  selectingFor={tribeId,slotIdx};
  const t=getTribe(tribeId);
  document.getElementById("banner-text").textContent=`正在為「${t.name}」第 ${slotIdx+1} 格選擇天賦`;
  document.getElementById("selecting-banner").style.display="flex";
  switchTab("db");
}
function cancelSelect(){
  selectingFor=null;
  document.getElementById("selecting-banner").style.display="none";
  renderDB();
}
function pickTalent(name){
  if(!selectingFor)return;
  const t=getTribe(selectingFor.tribeId);if(!t)return;
  if(t.talents.some(tt=>tt&&tt.name===name)){alert("此族人已擁有這個天賦！");return;}
  t.talents[selectingFor.slotIdx]=DATA.find(d=>d.name===name);
  cancelSelect();switchTab("plan");renderPlan();
}
function removeSlot(tribeId,slotIdx){
  const t=getTribe(tribeId);if(t){t.talents[slotIdx]=null;renderPlan();}
}
function getInitials(name){return name.slice(0,2)}
function avatarColor(id){const h=id.split("").reduce((a,c)=>a+c.charCodeAt(0),0);return ACOLORS[h%ACOLORS.length]}

function renderPlan(){
  const list=document.getElementById("tribe-list");
  const empty=document.getElementById("empty-plan");
  if(!tribes.length){list.innerHTML="";empty.style.display="block";return;}
  empty.style.display="none";
  list.innerHTML=tribes.map(t=>{
    const filled=t.talents.filter(Boolean).length;
    const slots=t.talents.map((tal,i)=>{
      if(!tal)return`<div class="slot-empty-card" onclick="startSelect('${t.id}',${i})"><div class="slot-plus">＋</div><div class="slot-empty-label">天賦 ${i+1}</div></div>`;
      const hasCd=tal.cd!=="—";
      const cdHtml=tal.cd==="永久"?`<div class="slot-filled-cd"><span class="slot-cd-pill">永久效果</span></div>`:hasCd?`<div class="slot-filled-cd">冷卻 <b style="color:var(--ink2);font-weight:500">${tal.cd}</b></div>`:"";
      return`<div class="slot-filled-card">
<div class="slot-filled-head"><div class="slot-filled-name">${tal.name}</div><button class="slot-remove" onclick="removeSlot('${t.id}',${i})" title="移除">✕</button></div>
<div class="slot-filled-badges">
  <span class="badge ${BD_SRC[tal.src]}" style="font-size:9px;padding:1px 5px">${SRC[tal.src]}</span>
  <span class="badge ${BD_CAT[tal.cat]}" style="font-size:9px;padding:1px 5px">${CAT_LBL[tal.cat]}</span>
  <span class="badge ${BD_TAG[tal.tag]}" style="font-size:9px;padding:1px 5px">${tal.tag}</span>
</div>
<div class="slot-filled-desc">${tal.desc}</div>
${cdHtml}
</div>`;
    }).join("");
    return`<div class="tribe-card">
<div class="tribe-head">
  <div class="tribe-avatar" style="background:${avatarColor(t.id)}">${getInitials(t.name)}</div>
  <div class="tribe-name-wrap"><div class="tribe-name">${t.name}</div><div class="tribe-count">${filled} / 6 天賦已配置</div></div>
  <div class="tribe-actions">
    <button class="icon-btn edit" onclick="renameTribe('${t.id}')" title="重新命名"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M9 2l2 2-7 7H2v-2z"/></svg></button>
    <button class="icon-btn" onclick="deleteTribe('${t.id}')" title="刪除"><svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3"><polyline points="2,3 11,3"/><path d="M4,3V2h5v1"/><path d="M5,5v5M8,5v5"/><path d="M3,3l.5,8h6L10,3"/></svg></button>
  </div>
</div>
<div class="tribe-slots">${slots}</div>
</div>`;
  }).join("");
}

function renderDB(){
  const q=document.getElementById("q").value.trim().toLowerCase();
  const isSel=!!selectingFor;
  const list=DATA.filter(d=>
    (curSrc==="all"||d.src===curSrc)&&
    (curCat==="all"||d.cat===curCat)&&
    (curTag==="all"||d.tag===curTag)&&
    (!q||d.name.toLowerCase().includes(q)||d.desc.toLowerCase().includes(q))
  );
  document.getElementById("rc").textContent=list.length;
  let pickedNames=new Set();
  if(isSel){const t=getTribe(selectingFor.tribeId);if(t)t.talents.forEach(tt=>{if(tt)pickedNames.add(tt.name);})}
  document.getElementById("grid").innerHTML=list.map(d=>{
    const isPicked=pickedNames.has(d.name);
    const hasCd=d.cd!=="—";
    const cdHtml=d.cd==="永久"?`<div style="margin-top:.4rem"><span class="cd-pill">永久效果</span></div>`:hasCd?`<div class="tcard-cd">冷卻 <b style="color:var(--ink2);font-weight:500">${d.cd}</b></div>`:"";
    return`<div class="tcard${isSel?" selectable":""}${isPicked?" picked":""}" onclick="${isSel&&!isPicked?"pickTalent('"+d.name.replace(/'/g,"\\'")+"')":""}">
<div class="tcard-top">
  <div class="tcard-name">${hl(d.name,q)}</div>
  <div class="badges">
    <span class="badge ${BD_SRC[d.src]}">${SRC[d.src]}</span>
    <span class="badge ${BD_CAT[d.cat]}">${CAT_LBL[d.cat]}</span>
    <span class="badge ${BD_TAG[d.tag]}">${d.tag}</span>
  </div>
</div>
<div class="tcard-desc">${hl(d.desc,q)}</div>
${cdHtml}
${isSel?`<button class="add-btn" onclick="event.stopPropagation();${isPicked?"":"pickTalent('"+d.name.replace(/'/g,"\\'")+"')"}">${isPicked?"✕":"＋"}</button>`:""}
</div>`;
  }).join("");
}

renderDB();renderPlan();
</script>
